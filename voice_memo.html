<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ボイスメモ">
<title>ボイスメモ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: #f2f2f7; min-height: 100vh; color: #1c1c1e;
}

/* ── Setup ── */
#setup {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 2rem;
}
#setup h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
#setup p { font-size: 14px; color: #6e6e73; margin-bottom: 2rem; text-align: center; line-height: 1.6; }
.setup-label { font-size: 13px; font-weight: 600; color: #3a3a3c; margin-bottom: 6px; align-self: flex-start; }
#setup input, #setup textarea {
  width: 100%; padding: 14px 16px; font-size: 15px;
  border: 1px solid #c7c7cc; border-radius: 12px;
  background: #fff; margin-bottom: 16px; outline: none; -webkit-appearance: none;
  font-family: inherit;
}
#setup input:focus, #setup textarea:focus { border-color: #007aff; }
#setup textarea { height: 100px; resize: none; line-height: 1.6; }
.setup-hint { font-size: 12px; color: #8e8e93; margin-top: -12px; margin-bottom: 16px; line-height: 1.5; align-self: flex-start; }
#setup button {
  width: 100%; padding: 14px; font-size: 16px; font-weight: 600;
  background: #007aff; color: #fff; border: none; border-radius: 12px;
  cursor: pointer; -webkit-appearance: none;
}
#setup button:active { opacity: 0.8; }

/* ── App ── */
#app { display: none; flex-direction: column; min-height: 100vh; }
header {
  background: #fff; padding: 16px 20px 12px;
  border-bottom: 0.5px solid #c6c6c8;
  display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-size: 17px; font-weight: 600; }
.header-btns { display: flex; gap: 12px; }
.hdr-btn { font-size: 13px; color: #007aff; background: none; border: none; cursor: pointer; padding: 4px; }

.mode-bar { display: flex; gap: 8px; padding: 12px 16px; background: #f2f2f7; }
.mode-btn {
  flex: 1; padding: 14px 4px; font-size: 14px; font-weight: 500;
  border: 1px solid #c7c7cc; border-radius: 12px;
  background: #fff; color: #3a3a3c; cursor: pointer;
  transition: all 0.15s; text-align: center; -webkit-appearance: none;
  line-height: 1.3;
}
.mode-btn.active { background: #007aff; color: #fff; border-color: #007aff; }

.record-area {
  display: flex; flex-direction: column; align-items: center;
  padding: 2rem 1.5rem 1rem; gap: 16px;
}
.timer {
  font-size: 32px; font-weight: 300; letter-spacing: 2px;
  color: #1c1c1e; min-height: 40px; font-variant-numeric: tabular-nums;
}
.mic-btn {
  width: 100px; height: 100px; border-radius: 50%;
  background: #007aff; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,122,255,0.35);
  transition: transform 0.1s, background 0.2s, box-shadow 0.2s;
  -webkit-appearance: none; flex-shrink: 0;
}
.mic-btn:active { transform: scale(0.95); }
.mic-btn.recording { background: #ff3b30; box-shadow: 0 4px 24px rgba(255,59,48,0.45); }
.mic-btn svg { width: 40px; height: 40px; fill: #fff; }

.waveform-wrap {
  width: 100%; height: 52px;
  display: flex; align-items: center; justify-content: center; gap: 3px;
  opacity: 0; transition: opacity 0.3s;
}
.waveform-wrap.active { opacity: 1; }
.wave-bar { width: 4px; border-radius: 2px; background: #ff3b30; height: 4px; transition: height 0.07s ease; flex-shrink: 0; }
.mic-label { font-size: 15px; color: #6e6e73; font-weight: 500; }

/* vocab badge */
.vocab-badge {
  font-size: 12px; color: #6e6e73; background: #fff;
  border: 1px solid #e5e5ea; border-radius: 8px;
  padding: 5px 12px; display: none;
}
.vocab-badge.visible { display: inline-block; }

.status-bar { padding: 6px 16px; text-align: center; font-size: 13px; color: #6e6e73; min-height: 28px; }
.status-bar.error { color: #ff3b30; }
.status-bar.loading { color: #007aff; }
.spinner {
  display: inline-block; width: 13px; height: 13px;
  border: 2px solid #c7c7cc; border-top-color: #007aff;
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 5px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.cards { padding: 0 16px 32px; display: flex; flex-direction: column; gap: 12px; }
.card { background: #fff; border-radius: 14px; padding: 14px 16px; }
.card-label { font-size: 11px; font-weight: 600; color: #6e6e73; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.card-text { font-size: 15px; line-height: 1.7; color: #1c1c1e; white-space: pre-wrap; min-height: 44px; }
.card-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; flex-wrap: wrap; }
.action-btn {
  font-size: 13px; padding: 7px 16px;
  border: 1px solid #c7c7cc; border-radius: 10px;
  background: #f2f2f7; color: #3a3a3c; cursor: pointer; -webkit-appearance: none;
}
.action-btn:active { opacity: 0.7; }
.action-btn.primary { background: #007aff; color: #fff; border-color: #007aff; font-weight: 600; }

/* ── Vocab modal ── */
#vocabModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 100;
  align-items: flex-end; justify-content: center;
}
#vocabModal.open { display: flex; }
.modal-box {
  background: #fff; border-radius: 20px 20px 0 0;
  width: 100%; max-width: 600px; padding: 20px 20px 40px;
}
.modal-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.modal-hint { font-size: 13px; color: #6e6e73; margin-bottom: 14px; line-height: 1.6; }
.modal-box textarea {
  width: 100%; height: 160px; padding: 12px; font-size: 15px;
  border: 1px solid #c7c7cc; border-radius: 12px;
  background: #f2f2f7; outline: none; font-family: inherit;
  resize: none; line-height: 1.6; margin-bottom: 14px;
}
.modal-box textarea:focus { border-color: #007aff; background: #fff; }
.modal-actions { display: flex; gap: 10px; }
.modal-actions button {
  flex: 1; padding: 13px; font-size: 16px; font-weight: 600;
  border: none; border-radius: 12px; cursor: pointer; -webkit-appearance: none;
}
.btn-cancel { background: #f2f2f7; color: #3a3a3c; }
.btn-save { background: #007aff; color: #fff; }
.btn-cancel:active, .btn-save:active { opacity: 0.8; }
</style>
</head>
<body>

<!-- Setup -->
<div id="setup">
  <h1>🎙️ ボイスメモ設定</h1>
  <p>OpenAI APIキーを入力してください。<br>キーはこの端末にのみ保存されます。</p>
  <label class="setup-label">APIキー</label>
  <input type="text" id="apiKeyInput" placeholder="sk-..." autocorrect="off" autocapitalize="none" spellcheck="false">
  <button onclick="toggleKeyVisibility()" id="eyeBtn" style="width:100%;padding:8px;font-size:13px;background:none;border:1px solid #c7c7cc;border-radius:10px;color:#007aff;cursor:pointer;margin-top:-10px;margin-bottom:4px;">👁️ 表示/非表示</button>
  <label class="setup-label">よく使う固有名詞（任意）</label>
  <textarea id="vocabSetupInput">名前：優（ゆう）、美南（みなみ）、莉子（りこ）、栞子（かこ）、紫乃（しの）
場所：ワテラス、本郷、本三、がんセンター、築地</textarea>
  <p class="setup-hint">名前・薬品名・施設名など、認識させたい言葉を自由に入力してください。あとで変更できます。</p>
  <button onclick="saveKey()">はじめる</button>
</div>

<!-- App -->
<div id="app">
  <header>
    <h1>🎙️ ボイスメモ</h1>
    <div class="header-btns">
      <button class="hdr-btn" onclick="openVocabModal()">📖 用語</button>
      <button class="hdr-btn" onclick="resetKey()">鍵</button>
    </div>
  </header>

  <div class="mode-bar">
    <button class="mode-btn active" data-mode="memo" onclick="setMode(this)">📝 メモ</button>
    <button class="mode-btn" data-mode="business" onclick="setMode(this)">💼 文書</button>
  </div>

  <!-- 履歴画面 -->
  <div id="historyView" style="display:none;flex-direction:column;flex:1;">
    <div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #c6c6c8;background:#fff;">
      <span style="font-size:15px;font-weight:600;">履歴</span>
      <button onclick="clearHistory()" style="font-size:13px;color:#ff3b30;background:none;border:none;cursor:pointer;">全削除</button>
    </div>
    <div id="historyList" style="flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;"></div>
  </div>

  <div id="record-main" style="display:flex;flex-direction:column;flex:1;">
  <div class="record-area">
    <div class="timer" id="timer">00:00</div>
    <button class="mic-btn" id="micBtn" onclick="toggleRecord()">
      <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 17.93V21h-2v2h6v-2h-2v-2.07A8 8 0 0 0 20 12h-2a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93z"/></svg>
    </button>
    <div class="waveform-wrap" id="waveform"></div>
    <div class="mic-label" id="micLabel">タップして録音</div>
    <button onclick="showHistory()" id="historyBtn" style="margin-top:4px;padding:10px 28px;font-size:14px;font-weight:500;border:1px solid #c7c7cc;border-radius:12px;background:#fff;color:#3a3a3c;cursor:pointer;-webkit-appearance:none;">🕐 履歴</button>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <div class="cards">
    <div class="card" id="transcriptCard" style="display:none">
      <div class="card-label">文字起こし（Whisper）</div>
      <div class="card-text" id="transcriptText"></div>
      <div class="card-actions">
        <button class="action-btn" onclick="copyText('transcriptText', this)">コピー</button>
      </div>
    </div>
    <div class="card" id="resultCard" style="display:none">
      <div class="card-label" id="resultLabel">整形結果</div>
      <div class="card-text" id="resultText"></div>
      <div class="card-actions">
        <button class="action-btn" onclick="copyText('resultText', this)">コピー</button>
        <button class="action-btn primary" onclick="shareResult()">📤 共有・保存</button>
      </div>
    </div>
  </div>
  </div><!-- /record-main -->
</div>

<!-- PIN Modal -->
<div id="pinModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:20px;padding:28px 24px;width:88%;max-width:320px;text-align:center;">
    <div style="font-size:17px;font-weight:600;margin-bottom:6px;">🔒 用語リスト</div>
    <div style="font-size:13px;color:#6e6e73;margin-bottom:20px;">4桁のPINを入力してください</div>
    <div style="display:flex;justify-content:center;gap:12px;margin-bottom:20px;">
      <input type="tel" maxlength="1" class="pin-digit" style="width:52px;height:56px;font-size:24px;text-align:center;border:1.5px solid #c7c7cc;border-radius:12px;outline:none;-webkit-appearance:none;">
      <input type="tel" maxlength="1" class="pin-digit" style="width:52px;height:56px;font-size:24px;text-align:center;border:1.5px solid #c7c7cc;border-radius:12px;outline:none;-webkit-appearance:none;">
      <input type="tel" maxlength="1" class="pin-digit" style="width:52px;height:56px;font-size:24px;text-align:center;border:1.5px solid #c7c7cc;border-radius:12px;outline:none;-webkit-appearance:none;">
      <input type="tel" maxlength="1" class="pin-digit" style="width:52px;height:56px;font-size:24px;text-align:center;border:1.5px solid #c7c7cc;border-radius:12px;outline:none;-webkit-appearance:none;">
    </div>
    <div id="pinError" style="font-size:13px;color:#ff3b30;min-height:18px;margin-bottom:12px;"></div>
    <div style="display:flex;gap:10px;">
      <button onclick="closePinModal()" style="flex:1;padding:13px;font-size:15px;font-weight:600;border:none;border-radius:12px;background:#f2f2f7;color:#3a3a3c;cursor:pointer;">キャンセル</button>
      <button onclick="checkPin()" style="flex:1;padding:13px;font-size:15px;font-weight:600;border:none;border-radius:12px;background:#007aff;color:#fff;cursor:pointer;">確認</button>
    </div>
    <div id="pinSetupHint" style="font-size:12px;color:#8e8e93;margin-top:14px;line-height:1.5;"></div>
  </div>
</div>

<!-- Vocab Modal -->
<div id="vocabModal">
  <div class="modal-box">
    <div class="modal-title">📖 固有名詞リスト</div>
    <div class="modal-hint">名前・薬品名・施設名など、認識精度を上げたい言葉を入力してください。WhisperとGPTの両方に反映されます。</div>
    <textarea id="vocabModalInput" placeholder="例：&#10;息子の名前：陸（りく）&#10;フォシーガ、エンレスト&#10;田中一郎、山田花子"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeVocabModal()">キャンセル</button>
      <button class="btn-save" onclick="saveVocab()">保存</button>
    </div>
  </div>
</div>

<script>
var PROMPTS = {
  memo: "あなたは音声メモの書き起こしツールです。以下は口頭で話した内容の文字起こしです。\n\n【絶対に守ること】\n・話者が言ったことだけを箇条書きにする。一語一句変えない\n・断定は断定のまま、推量（〜だと思う、〜でしょう）は推量のまま、疑問（〜だろう？〜かな？）は疑問のまま残す\n・語調・ニュアンス・感情を変えない。客観的な言い回しに直さない\n・解釈・説明・補足・アドバイス・効能は一切追加しない\n・フィラー（えー、あのー等）と明らかな言い淀みのみ除去\n・誤字・誤変換の修正のみ行う（表現は変えない）\n・日本語で出力\n\n【出力例】\n入力:美南はどうせYouTubeを見ているでしょう。なんで今日は遊びに行かなかったんだろう?\n出力:\n・美南はどうせYouTubeを見ているでしょう\n・なんで今日は遊びに行かなかったんだろう?",
  business: "あなたは音声メモの書き起こしツールです。以下は口頭で話した内容の文字起こしです。\n内容を自動判断し、ビジネス・正式文書として適切な文章に整形してください。\n\n【整形ルール】\n・話し言葉を自然な書き言葉に変換\n・医療・医学的内容が含まれる場合：医学用語・薬剤名・検査名・疾患名を正しく修正・補完する\n・解釈・説明・補足情報は追加しない。話した内容だけをまとめる\n・段落を整理して読みやすくまとめる\n・内容の意味・ニュアンスは変えない\n・日本語で出力"
};

var currentMode = 'memo';
var mediaRecorder = null;
var audioChunks = [];
var isRecording = false;
var timerInterval = null;
var seconds = 0;
var apiKey = '';
var vocab = '';
var audioCtx = null;
var analyser = null;
var waveRAF = null;
var waveBars = [];

var DEFAULT_VOCAB = "名前：優（ゆう）、美南（みなみ）、莉子（りこ）、栞子（かこ）、紫乃（しの）\n場所：ワテラス、本郷、本三、がんセンター、築地";

window.onload = function() {
  apiKey = localStorage.getItem('openai_key') || '';
  vocab = localStorage.getItem('vocab') !== null ? localStorage.getItem('vocab') : DEFAULT_VOCAB;
  if (apiKey) showApp();
  buildWaveform();
  updateVocabBadge();
};

// ── Setup ──
function toggleKeyVisibility() {
  var input = document.getElementById('apiKeyInput');
  var btn = document.getElementById('eyeBtn');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁️';
  }
}

function saveKey() {
  var key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-')) { alert('APIキーは sk- で始まります'); return; }
  var v = document.getElementById('vocabSetupInput').value.trim();
  localStorage.setItem('openai_key', key);
  localStorage.setItem('vocab', v);
  apiKey = key;
  vocab = v;
  showApp();
  updateVocabBadge();
}

function resetKey() {
  if (!confirm('APIキーをリセットしますか？')) return;
  localStorage.removeItem('openai_key');
  apiKey = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('apiKeyInput').value = '';
  document.getElementById('vocabSetupInput').value = vocab;
}

function showApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

// ── PIN ──
function openVocabModal() {
  var pin = localStorage.getItem('vocab_pin') || '';
  if (!pin) {
    // PINが未設定：新規設定モード
    document.getElementById('pinSetupHint').textContent = 'PINが未設定です。4桁を入力すると新しいPINとして登録されます。';
  } else {
    document.getElementById('pinSetupHint').textContent = '';
  }
  document.getElementById('pinError').textContent = '';
  document.querySelectorAll('.pin-digit').forEach(function(el) { el.value = ''; });
  document.getElementById('pinModal').style.display = 'flex';
  setTimeout(function() { document.querySelectorAll('.pin-digit')[0].focus(); }, 100);

  // 1文字入力したら次へ自動フォーカス
  var digits = document.querySelectorAll('.pin-digit');
  digits.forEach(function(el, i) {
    el.oninput = function() {
      el.value = el.value.replace(/[^0-9]/g, '').slice(-1);
      if (el.value && i < digits.length - 1) digits[i+1].focus();
    };
    el.onkeydown = function(e) {
      if (e.key === 'Backspace' && !el.value && i > 0) digits[i-1].focus();
      if (e.key === 'Enter') checkPin();
    };
  });
}

function closePinModal() {
  document.getElementById('pinModal').style.display = 'none';
}

function checkPin() {
  var entered = Array.from(document.querySelectorAll('.pin-digit')).map(function(el){ return el.value; }).join('');
  if (entered.length < 4) {
    document.getElementById('pinError').textContent = '4桁すべて入力してください';
    return;
  }
  var savedPin = localStorage.getItem('vocab_pin') || '';
  if (!savedPin) {
    // 新規PIN登録
    localStorage.setItem('vocab_pin', entered);
    closePinModal();
    openVocabModalDirect();
    return;
  }
  if (entered === savedPin) {
    closePinModal();
    openVocabModalDirect();
  } else {
    document.getElementById('pinError').textContent = 'PINが違います';
    document.querySelectorAll('.pin-digit').forEach(function(el){ el.value=''; });
    document.querySelectorAll('.pin-digit')[0].focus();
  }
}

// ── Vocab modal ──
function openVocabModalDirect() {
  document.getElementById('vocabModalInput').value = vocab;
  document.getElementById('vocabModal').classList.add('open');
}
function closeVocabModal() {
  document.getElementById('vocabModal').classList.remove('open');
}
function saveVocab() {
  vocab = document.getElementById('vocabModalInput').value.trim();
  localStorage.setItem('vocab', vocab);
  updateVocabBadge();
  closeVocabModal();
}
// ── 履歴 ──
var MAX_HISTORY = 20;

function saveToHistory(text, mode) {
  var history = JSON.parse(localStorage.getItem('memo_history') || '[]');
  var entry = {
    text: text,
    mode: mode,
    date: new Date().toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
  };
  history.unshift(entry);
  if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
  localStorage.setItem('memo_history', JSON.stringify(history));
}

function showHistory() {
  document.getElementById('historyBtn').classList.add('active');
  document.querySelectorAll('.mode-btn:not(#historyBtn)').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('record-main').style.display = 'none';
  document.getElementById('historyView').style.display = 'flex';
  renderHistory();
}

function hideHistory() {
  document.getElementById('historyView').style.display = 'none';
  document.getElementById('record-main').style.display = 'flex';
}

function renderHistory() {
  var history = JSON.parse(localStorage.getItem('memo_history') || '[]');
  var list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#c7c7cc;padding:2rem;font-size:14px;">履歴はありません</div>';
    return;
  }
  list.innerHTML = history.map(function(entry, i) {
    return '<div style="background:#fff;border-radius:14px;padding:14px 16px;">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">' +
      '<span style="font-size:11px;font-weight:600;color:#6e6e73;text-transform:uppercase;letter-spacing:0.5px;">' + (entry.mode === 'memo' ? '📝 メモ' : '💼 文書') + '</span>' +
      '<span style="font-size:11px;color:#c7c7cc;">' + entry.date + '</span>' +
      '</div>' +
      '<div style="font-size:14px;line-height:1.7;color:#1c1c1e;white-space:pre-wrap;">' + entry.text + '</div>' +
      '<div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end;">' +
      '<button onclick="copyHistoryItem(' + i + ')" style="font-size:12px;padding:5px 12px;border:1px solid #c7c7cc;border-radius:8px;background:#f2f2f7;color:#3a3a3c;cursor:pointer;">コピー</button>' +
      '<button onclick="shareHistoryItem(' + i + ')" style="font-size:12px;padding:5px 12px;border:1px solid #007aff;border-radius:8px;background:#007aff;color:#fff;cursor:pointer;">共有</button>' +
      '</div>' +
      '</div>';
  }).join('');
}

function copyHistoryItem(i) {
  var history = JSON.parse(localStorage.getItem('memo_history') || '[]');
  navigator.clipboard.writeText(history[i].text).catch(function(){});
}

function shareHistoryItem(i) {
  var history = JSON.parse(localStorage.getItem('memo_history') || '[]');
  if (navigator.share) navigator.share({ title: 'ボイスメモ', text: history[i].text }).catch(function(){});
}

function clearHistory() {
  if (!confirm('履歴を全件削除しますか？')) return;
  localStorage.removeItem('memo_history');
  renderHistory();
}

function updateVocabBadge() {
  // バッジ非表示（削除済み）
  if (false) {
  } else {
    badge.classList.remove('visible');
  }

// ── Mode ──
function setMode(btn) {
  document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentMode = btn.dataset.mode;
  hideHistory();
}

function formatTime(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

// ── Waveform ──
function buildWaveform() {
  var wrap = document.getElementById('waveform');
  wrap.innerHTML = '';
  waveBars = [];
  for (var i = 0; i < 36; i++) {
    var b = document.createElement('div');
    b.className = 'wave-bar';
    wrap.appendChild(b);
    waveBars.push(b);
  }
}

function startWaveform(stream) {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 128;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    var data = new Uint8Array(analyser.frequencyBinCount);
    document.getElementById('waveform').classList.add('active');
    function draw() {
      waveRAF = requestAnimationFrame(draw);
      analyser.getByteFrequencyData(data);
      waveBars.forEach(function(bar, i) {
        var idx = Math.floor(i * data.length / waveBars.length);
        var h = Math.max(4, (data[idx] / 255) * 46);
        bar.style.height = h + 'px';
      });
    }
    draw();
  } catch(e) {}
}

function stopWaveform() {
  if (waveRAF) { cancelAnimationFrame(waveRAF); waveRAF = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  document.getElementById('waveform').classList.remove('active');
  waveBars.forEach(function(b) { b.style.height = '4px'; });
}

// ── Recording ──
function toggleRecord() {
  if (isRecording) stopRecording();
  else startRecording();
}

function startRecording() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    audioChunks = [];
    var mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
                 : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType: mimeType } : {});
    mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = function() {
      stream.getTracks().forEach(function(t) { t.stop(); });
      processAudio();
    };
    mediaRecorder.start(1000);
    isRecording = true;
    startWaveform(stream);
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micLabel').textContent = 'タップして停止';
    document.getElementById('transcriptCard').style.display = 'none';
    document.getElementById('resultCard').style.display = 'none';
    setStatus('', '');
    seconds = 0;
    document.getElementById('timer').textContent = '00:00';
    timerInterval = setInterval(function() {
      seconds++;
      document.getElementById('timer').textContent = formatTime(seconds);
    }, 1000);
  }).catch(function() {
    setStatus('マイクへのアクセスが許可されていません', 'error');
  });
}

function stopRecording() {
  if (!mediaRecorder || !isRecording) return;
  mediaRecorder.stop();
  isRecording = false;
  clearInterval(timerInterval);
  stopWaveform();
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micLabel').textContent = 'タップして録音';
}

// ── Process ──
function processAudio() {
  setStatus('<span class="spinner"></span>文字起こし中…', 'loading');

  var mimeType = (audioChunks[0] && audioChunks[0].type) || 'audio/webm';
  var ext = mimeType.indexOf('mp4') >= 0 ? 'mp4' : 'webm';
  var blob = new Blob(audioChunks, { type: mimeType });

  var form = new FormData();
  form.append('file', blob, 'audio.' + ext);
  form.append('model', 'whisper-1');
  form.append('language', 'ja');

  // ① Whisperのpromptに固有名詞を渡す
  if (vocab) {
    form.append('prompt', vocab);
  }

  fetch('https://api.openai.com/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + apiKey },
    body: form
  })
  .then(function(r) { return r.json(); })
  .then(function(wData) {
    if (wData.error) throw new Error(wData.error.message);
    var transcript = (wData.text || '').trim();
    if (!transcript) { setStatus('音声が認識できませんでした', 'error'); return; }

    document.getElementById('transcriptText').textContent = transcript;
    document.getElementById('transcriptCard').style.display = 'block';
    setStatus('<span class="spinner"></span>整形中…', 'loading');

    // ② GPT整形プロンプトに固有名詞辞書を追加
    var basePrompt = PROMPTS[currentMode];
    var fullPrompt = vocab
      ? basePrompt + '\n\n【固有名詞変換ルール】以下の固有名詞が文字起こしに登場した場合、読み方が一致するものは必ず指定の表記に変換してください。ただし話者が言っていない固有名詞を新たに追加することは禁止です：\n' + vocab
      : basePrompt;

    return fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o',
        max_tokens: 1000,
        messages: [
          { role: 'system', content: fullPrompt },
          { role: 'user', content: transcript }
        ]
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(gData) {
      if (gData.error) throw new Error(gData.error.message);
      var result = gData.choices && gData.choices[0] && gData.choices[0].message.content.trim() || '';

      document.getElementById('resultText').textContent = result || '（結果なし）';
      document.getElementById('resultLabel').textContent = currentMode === 'memo' ? '📝 メモ' : '💼 文書整形';
      document.getElementById('resultCard').style.display = 'block';
      setStatus('完了 ✓', '');
      setTimeout(function() { setStatus('', ''); }, 3000);

      // 履歴に保存
      if (result) saveToHistory(result, currentMode);
      // 自動共有なし（手動ボタンのみ）
    });
  })
  .catch(function(e) {
    setStatus('エラー: ' + e.message, 'error');
  });
}

// ── Utils ──
function setStatus(html, type) {
  var bar = document.getElementById('statusBar');
  bar.innerHTML = html;
  bar.className = 'status-bar' + (type ? ' ' + type : '');
}

function copyText(id, btn) {
  var text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = 'コピー済 ✓';
    setTimeout(function() { btn.textContent = 'コピー'; }, 1500);
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    btn.textContent = 'コピー済 ✓';
    setTimeout(function() { btn.textContent = 'コピー'; }, 1500);
  });
}

function shareResult() {
  var text = document.getElementById('resultText').textContent;
  if (navigator.share) {
    navigator.share({ title: 'ボイスメモ', text: text }).catch(function() {});
  } else {
    navigator.clipboard.writeText(text).then(function() { alert('クリップボードにコピーしました'); });
  }
}
